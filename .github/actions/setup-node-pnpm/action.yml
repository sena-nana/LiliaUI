name: Setup Node and pnpm
description: Install the repository Node baseline and pinned pnpm

inputs:
  working-directory:
    description: Directory containing package.json and pnpm-lock.yaml
    default: .

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 11.14.0

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.working-directory }}/.node-version
        cache: pnpm
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: Enable the Node compile cache
      shell: bash
      run: |
        echo "NODE_COMPILE_CACHE=${RUNNER_TEMP}/node-compile-cache" >> "${GITHUB_ENV}"
        echo "NODE_COMPILE_CACHE_PORTABLE=1" >> "${GITHUB_ENV}"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NODE_COMPILE_CACHE: ${{ runner.temp }}/node-compile-cache
        NODE_COMPILE_CACHE_PORTABLE: "1"
      run: pnpm install --frozen-lockfile
