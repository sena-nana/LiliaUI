name: Setup Node and Yarn
description: Install the repository Node baseline, explicit Corepack, and pinned Yarn

inputs:
  working-directory:
    description: Directory containing package.json and yarn.lock
    default: .

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.working-directory }}/.node-version

    - name: Install Corepack
      shell: bash
      run: |
        corepack_prefix="${RUNNER_TEMP}/corepack-0.35.0"
        npm install --global --prefix "${corepack_prefix}" corepack@0.35.0

        if [[ "${RUNNER_OS}" == "Windows" ]]; then
          echo "${corepack_prefix}" >> "${GITHUB_PATH}"
        else
          echo "${corepack_prefix}/bin" >> "${GITHUB_PATH}"
        fi

    - name: Enable the Node compile cache
      shell: bash
      run: |
        echo "NODE_COMPILE_CACHE=${RUNNER_TEMP}/node-compile-cache" >> "${GITHUB_ENV}"
        echo "NODE_COMPILE_CACHE_PORTABLE=1" >> "${GITHUB_ENV}"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        NODE_COMPILE_CACHE: ${{ runner.temp }}/node-compile-cache
        NODE_COMPILE_CACHE_PORTABLE: "1"
      run: corepack yarn install --immutable
