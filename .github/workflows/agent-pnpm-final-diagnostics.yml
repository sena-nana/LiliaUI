name: Diagnose final pnpm checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  windows-typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run typecheck
        id: check
        continue-on-error: true
        shell: pwsh
        run: pnpm typecheck *> pnpm-windows-typecheck.log
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-windows-typecheck-log
          path: pnpm-windows-typecheck.log
          retention-days: 1
      - if: steps.check.outcome != 'success'
        run: exit 1

  ubuntu-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-node-pnpm
      - name: Run tests
        id: check
        continue-on-error: true
        shell: bash
        run: pnpm test > pnpm-ubuntu-test.log 2>&1
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-ubuntu-test-log
          path: pnpm-ubuntu-test.log
          retention-days: 1
      - if: steps.check.outcome != 'success'
        run: exit 1
