name: Refresh pnpm lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pnpm-lockfile-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Refresh lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile --ignore-scripts

      - name: Commit lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: refresh pnpm lockfile"
          git push origin HEAD
