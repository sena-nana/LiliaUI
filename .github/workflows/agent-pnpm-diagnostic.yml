name: Diagnose pnpm setup

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Inspect toolchain
        run: |
          node --version
          pnpm --version
          pnpm store path

      - name: Install frozen dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: pnpm install --frozen-lockfile > pnpm-install.log 2>&1

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-install-log
          path: pnpm-install.log
          if-no-files-found: error
          retention-days: 1

      - name: Require successful install
        if: steps.install.outcome != 'success'
        run: exit 1
