name: Diagnose pnpm typecheck

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up project
        uses: ./.github/actions/setup-node-pnpm

      - name: Run typecheck
        id: typecheck
        continue-on-error: true
        shell: bash
        run: pnpm typecheck > pnpm-typecheck.log 2>&1

      - name: Upload typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-typecheck-log
          path: pnpm-typecheck.log
          if-no-files-found: error
          retention-days: 1

      - name: Require successful typecheck
        if: steps.typecheck.outcome != 'success'
        run: exit 1
